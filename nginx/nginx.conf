# nginx reverse proxy for StrawBoss production.
# Terminates TLS and routes traffic to the backend and admin-web containers.
#
# Access and error streams use the default (stdout/stderr) so `docker compose logs nginx`
# captures them. App JSON logs live under the repo's `logs/` volume (backend/admin), not here.
#
# First-time setup (get Let's Encrypt cert):
#   ./strawboss.sh docker:up nginx          # bring nginx up on port 80
#   ./strawboss.sh ssl:init                  # issue cert via HTTP-01 challenge
#   ./strawboss.sh docker:up                 # bring all services up with HTTPS

# ── HTTP: redirect to HTTPS + serve ACME challenge ──────────────────────────
server {
    listen 80;
    server_name nortiauno.com www.nortiauno.com;

    # Let's Encrypt HTTP-01 challenge (used by ssl:init).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name nortiauno.com www.nortiauno.com;

    ssl_certificate     /etc/letsencrypt/live/nortiauno.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nortiauno.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Docker embedded DNS — re-resolve service names after containers are recreated
    # (static proxy_pass hostnames are cached at nginx start → stale IP → 502).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API requests to the NestJS backend container.
    location /api/ {
        set $api_upstream backend:3001;
        proxy_pass         http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy everything else to the Next.js admin-web container.
    location / {
        set $admin_upstream admin:3000;
        proxy_pass         http://$admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
